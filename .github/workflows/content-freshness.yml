name: Content Freshness

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Sync curated website content
        run: npm run content:sync

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(data): refresh website curated content'
          branch: 'codex/content-freshness'
          delete-branch: true
          title: 'chore(data): refresh website curated content'
          body: |
            Automated refresh of website-derived curated metadata.

            - Source: https://www.tablafocus.com/api/ios/articles
            - Command: `npm run content:sync`
          labels: |
            data
            automation
